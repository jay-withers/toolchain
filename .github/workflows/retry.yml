name: retry

on:
  workflow_run:
    workflows: ["test-install", "pre-commit"]
    types: [completed]

jobs:
  retry:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 5 &&
      startsWith(github.event.workflow_run.head_branch, 'renovate/')
    runs-on: ubuntu-latest
    steps:
      - run: gh run rerun ${{ github.event.workflow_run.id }} --failed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
