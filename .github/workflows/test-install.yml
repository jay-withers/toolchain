name: test-install

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run setup
        run: bash scripts/setup.sh

  macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run setup
        run: bash scripts/setup.sh
