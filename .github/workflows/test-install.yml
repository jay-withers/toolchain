name: test-install

on:
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: filter
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$BASE" "$HEAD" | grep -qE '^(src/|\.github/workflows/test-install\.yml)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  linux:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run setup
        run: bash src/setup.sh

  macos:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run setup
        run: bash src/setup.sh

  result:
    needs: [linux, macos]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Check results
        run: |
          linux="${{ needs.linux.result }}"
          macos="${{ needs.macos.result }}"
          if [[ ($linux == "success" || $linux == "skipped") && ($macos == "success" || $macos == "skipped") ]]; then
            exit 0
          else
            exit 1
          fi
